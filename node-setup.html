  <script>
    const appDisclaimer = `<p style="margin-top:1.2rem; padding-top:.75rem; border-top:1px solid rgba(158,208,255,.12); font-size:.78rem; color:var(--muted); line-height:1.65;"><strong style="color:var(--text);">Third-Party Software Disclaimer:</strong> This application is open-source, independently developed software. Eastern Shore AI, LLC has no partnership, affiliation, sponsorship, or arrangement of any kind with the developer(s) or vendor(s) of this software. All product names, brand names, and trademarks are the property of their respective owners and are referenced here solely for informational and identification purposes. This software is provided as-is; your use of it is entirely at your own risk. Eastern Shore AI, LLC makes no warranties — express or implied — regarding the accuracy, reliability, or fitness of any third-party application for any particular purpose.</p>`;

    const sections = [
      {
        title: 'Initial Setup',
        html: `<p><strong>Do this immediately after delivery.</strong></p>
               <p>Your Survival Node is built around an <strong>offline-first philosophy</strong> — every app, AI model, and map on this device is designed to work without internet access, cell signal, or a service account. You do not need a SIM card or service plan for any of its core capabilities.</p>
               <p><strong>About Your Packaging</strong></p>
               <p style="color:var(--muted); font-size:.9rem;">Your Survival Node ships in a standard cardboard box which may display the logo or branding of another company. This is standard supply chain practice and does not indicate any partnership or affiliation between that company and Eastern Shore AI, LLC.</p>
               <p><strong>What's in the Box</strong></p>
               <ul>
                 <li>Survival Node phone — debloated Android OS, optimized for performance and longevity, pre-loaded with 50GB+ survival apps and 3 offline LLMs — wall charger, USB-C cable, and shockproof phone case included</li>
                 <li>Solar Battery with 4 attached cables (1× USB-C, 1× iOS, 1× micro/mini USB, 1× USB-A), built-in flashlight, and emergency strobe</li>
                 <li>(2) Faraday Bags — signal-blocking, one for phone, one for solar battery</li>
                 <li>Weatherproof hard storage case with padlock and silica gel packs</li>
                 <li>Full Users Guide — pre-loaded on the phone; open the <strong>Files</strong> folder on the home screen to find it</li>
               </ul>
               <p><strong>First Steps</strong></p>
               <p style="color:var(--muted); font-size:.9rem;"><em>Note: Your Survival Node phone was intentionally drained to approximately 30% before shipping to comply with lithium battery shipping regulations. This is normal — don't be surprised if the phone is at 30% or below when you open the box.</em></p>
               <ul>
                 <li><strong>Charge the solar battery:</strong> Plug your solar battery into wall power using the included charger. You can charge to 100% to verify all LEDs are solid and it's working correctly, then bring it back down to <strong>50–70%</strong> before sealing for long-term storage.</li>
                 <li><strong>Charge the phone:</strong> Plug the phone in using the included wall charger and USB-C cable. Charge it to 50–60% — this is the ideal range for long-term storage health. Do not store it at full charge or fully drained.</li>
                 <li><strong>Seal for readiness:</strong> Place the phone and power hub into their Faraday bags, fold the top twice, seal tightly, then store both in the case with the included reusable silica gel packs.</li>
               </ul>
               <p><strong>Storage Conditions</strong></p>
               <p>Store your Survival Node in a cool, dry location — ideally between 60°F (15°C) and 85°F (30°C). Avoid cars, attics, and garages where temperatures reach damaging extremes. The included silica gel packs absorb moisture and are reusable; when the orange indicator beads turn dark green they are saturated and need to be reactivated via heating in the microwave or exposure to sunlight. According to the silica manufacturer: To reuse the silica packs, heat in the microwave for about 5 minutes or in the oven at 200-250 degrees Fahrenheit for .5 to 2 hours - we recommend the microwave for convenience and starting with just a few minutes at first as different microwaves have different power outputs and you don't want to overheat the packs, which might cause the outer packaging to melt. Store the case upright, away from direct sunlight.</p>
               <p><strong>SIM Card &amp; Cellular Connectivity</strong></p>
               <p>No SIM card or service plan is required. All core features — AI, maps, and reference apps — work fully offline.  We do not recommend attempting to connect this phone to a cellular network or installing a SIM card. Treat cellular connectivity as a bonus when available — your emergency operations should never depend on it.</p>`
      },
      {
        title: 'Maintenance (6-Month Rule)',
        html: `<p>Twice per year, run a full readiness check:</p>
               <ul>
                 <li>Open the case and remove items from Faraday bags.</li>
                 <li>Charge the power hub to <strong>50–70%</strong> on wall power before resealing. You can charge to 100% to verify full capacity, then bring it back down to 50–70% for storage.</li>
                 <li>Power on the phone for 10 minutes (charge it if below 50%), then power it down at roughly 50% charge.</li>
                 <li>Inspect the battery area — if the phone back feels warped or the battery appears swollen, do not store it. See the Power &amp; Solar Charging section for safe next steps.</li>
                 <li>Inspect cables, seals, and Faraday bag folds for wear or damage, then reseal.</li>
                 <li>Check silica gel packs — reactivate if saturated.</li>
                 <li>Set the next reminder now — preparedness fails when maintenance slips.</li>
               </ul>
               <p><strong>Update Your PocketPal AI Models</strong></p>
               <p>AI models improve regularly. Your 6-month check is a good time to see if newer, more capable models are available. Updating takes about 5–10 minutes on Wi-Fi and keeps your offline AI current.</p>
               <p>Your Survival Node shipped pre-loaded with one model. You can add additional models at any time through PocketPal — just be mindful of available storage. When updating, you can swap in newer, more capable models as they become available.</p>
               <ol>
                 <li>Connect the phone to Wi-Fi.</li>
                 <li>Open the <strong>PocketPal</strong> app.</li>
                 <li>Tap the <strong>Models</strong> tab at the bottom of the screen.</li>
                 <li>Browse available models. Look for updated versions of models you already have, or newer options at similar or smaller sizes (e.g., a newer Llama or Gemma release).</li>
                 <li>Tap <strong>Download</strong> on any model you want to add.</li>
                 <li>Once downloaded, open a new chat and select the new model from the model picker to confirm it loads correctly.</li>
                 <li>If you are satisfied with the new model, you can delete the older version: tap <strong>Models</strong> → long-press the old model → <strong>Delete</strong> to free up storage.</li>
               </ol>
               <p style="color:var(--muted); font-size:.9rem;"><em>Tip: When replacing a model, swap like-for-like by size — replace your old small model with a new small model, your old medium with a new medium, etc. This keeps your storage balanced and ensures you always have the right tool for every situation.</em></p>
               <p><strong>Update Your Offline Maps</strong></p>
               <p>Map data — roads, points of interest, routing — is updated periodically by app providers. Updating your offline maps during your 6-month check ensures your navigation stays accurate.</p>
               <ol>
                 <li>Connect the phone to Wi-Fi.</li>
                 <li>Open your offline map app (e.g., <strong>OsmAnd</strong> or <strong>Maps.me</strong>).</li>
                 <li>Go to <strong>Menu → Maps &amp; Data</strong> or <strong>Settings → Downloads</strong> (exact label varies by app).</li>
                 <li>Look for a <strong>"Check for map updates"</strong> or <strong>"Download updated maps"</strong> option.</li>
                 <li>Select the regions you use and tap <strong>Update</strong>. Downloads can be large — use Wi-Fi only, not mobile data.</li>
                 <li>Once updated, run a quick test search or route to confirm the new data loaded correctly.</li>
                 <li>Disconnect from Wi-Fi when finished.</li>
               </ol>
               <p><strong>Update Your Other Apps</strong></p>
               <p>While you have Wi-Fi connected, take a few minutes to update your other offline apps as well. Bug fixes and new features make a real difference in the field.</p>
               <ol>
                 <li>Open <strong>F Droid</strong>.</li>
                 <li>Tap the <strong>Updates</strong> tab at the bottom of the screen.</li>
                 <li>Tap <strong>Update All</strong> to apply all available updates at once, or tap individual apps to review and update one at a time.</li>
                 <li>Once all updates are complete, disconnect from Wi-Fi and return to offline mode.</li>
               </ol>
               <p style="color:var(--muted); font-size:.9rem;"><em>Note: Only connect to a trusted private Wi-Fi network (your home network) during maintenance. Avoid public Wi-Fi when updating your Survival Node.</em></p>`
      },
      {
        title: 'Emergency Deployment',
        html: `<p><strong>Grid-down protocol:</strong></p>
               <ul>
                 <li>After removing the phone from Faraday storage, keep <strong>Airplane Mode ON</strong> to prevent battery drain from constant tower searching.</li>
                 <li>Use your offline stack first: maps, local AI, and local knowledge library.</li>
                 <li>Conserve power by lowering brightness and closing background apps.</li>
               </ul>
               <p><strong>Use-case order:</strong> navigation → medical/repair knowledge → communications when needed. You should always fully power the phone down after use to preserve the battery.</p>
               <p><strong>Using Calls &amp; Texts During Emergencies</strong></p>
               <p>If you installed a SIM card (we do not recommend this) and a cell tower is reachable, you can make calls and send SMS texts even when internet data is unavailable. Keep in mind:</p>
               <ul>
                 <li>A partial signal that cannot load a web page can still carry voice calls and SMS texts.</li>
                 <li>Turn cellular back OFF and return to Airplane Mode when not actively communicating to preserve battery.</li>
                 <li>Your Survival Node's AI, maps, and apps do not require a signal — they run entirely on the device regardless of connectivity.</li>
                 <li>If you do not have a SIM installed, the phone still functions fully for all offline capabilities.</li>
               </ul>`
      },
      {
        title: 'Power & Solar Charging',
        html: `<p><strong>Solar Charging — What to Expect:</strong> The integrated solar panel is not designed to keep the phone charged during all-day normal use — and that's fine, because this is not a normal-use device. Under emergency conditions — where you use the phone for a specific task and then power it off — the solar battery can sustain the kit indefinitely. Eastern Shore AI founder Chris Gorham has powered his test Survival Node exclusively via solar for over 6 months without ever connecting it to wall power.</p>
               <p><strong>The rule: use it, then shut it off.</strong> Solar input accumulates while the phone is powered off. Brief emergency sessions draw far less power than the panel can replenish over a day of sunlight. The more disciplined you are about powering the phone off between uses, the longer your solar reserve lasts.</p>
               <ul>
                 <li>Place panel in direct overhead sun and re-angle as sunlight shifts.</li>
                 <li>Power the phone <strong>off</strong> when not actively in use — this is the single most important habit for solar-only operation.</li>
                 <li>Use wall charging whenever available to top off the reserve.</li>
                 <li>Avoid high-heat charging sessions with phone connected.</li>
                 <li>Plan your power budget: prioritize mission-critical tasks, then shut down.</li>
               </ul>
               <p><strong>Battery Temperature Limits</strong></p>
               <p>Lithium batteries are sensitive to heat and cold. Operating or charging outside safe ranges causes permanent capacity loss and, in severe cases, safety risks.</p>
               <ul>
                 <li><strong>Do not charge above 113°F (45°C).</strong> If the power hub or phone feels hot to the touch, stop charging and move to shade before resuming.</li>
                 <li><strong>Do not store below 14°F (−10°C).</strong> Extended freezing storage degrades cells. If your kit has been in the cold, allow it to warm to room temperature before charging.</li>
                 <li>Ideal long-term storage temperature: 60°F–75°F (15°C–24°C) at roughly 50% charge.</li>
               </ul>
               <p><strong>Swollen Battery Warning</strong></p>
               <p>If you notice the phone back warping outward, or the power hub casing is deformed, stop using the device immediately. A swollen lithium battery is a fire and puncture hazard. Do not attempt to charge it, compress it, or dispose of it in regular trash. Take it to a certified battery recycling location (Best Buy, Home Depot, and many auto parts stores accept lithium batteries at no charge). Contact us at <a href="mailto:support@easternshore.ai" style="color:var(--cyan)">support@easternshore.ai</a> to discuss replacement options.</p>
               <p><strong>Manufacturer Safety Notices</strong></p>
               <ul>
                 <li>Do not charge and discharge simultaneously — do not connect input and output ports at the same time, as this will reduce product service life and may prevent connected devices from charging.</li>
                 <li>Keep this product dry. Rain, moisture, and liquids will corrode electronic components and circuitry.</li>
                 <li>Do not attempt to disassemble this product.</li>
               </ul>`
      },
      {
        title: 'Battery Management',
        html: `<p>Proper battery habits extend device life significantly — especially for a kit that may sit in storage for months before it's needed.</p>

               <p><strong>Daily Use Tips</strong></p>
               <ul>
                 <li><strong>Avoid charging to 100% regularly.</strong> Keeping your phone between 20–85% puts less stress on the battery cells and extends overall lifespan. Use Battery Bot Pro to set a charge alarm at 85% so you know when to unplug.</li>
                 <li><strong>Avoid deep discharges.</strong> Repeatedly draining to 0% accelerates degradation. Recharge before you hit 15%.</li>
                 <li><strong>Charge at room temperature.</strong> Charging a hot or cold phone causes permanent capacity loss. Let the device reach room temperature first.</li>
                 <li><strong>Use the original or quality USB-C cable.</strong> Cheap cables can undercharge or intermittently disconnect, which stresses the battery controller.</li>
               </ul>

               <p><strong>Long-Term Storage</strong></p>
               <p>If storing your Survival Node for an extended period (months to a year+), follow these steps before sealing it in the hard case:</p>
               <ol style="margin:.3rem 0 .7rem; padding-left:1.2rem; line-height:1.8;">
                 <li>Charge the phone to <strong>40–60%</strong> — this is the ideal resting state for lithium batteries in storage. Do not store at full charge or near empty.</li>
                 <li>Power the phone completely off before storing.</li>
                 <li>Charge the solar power hub to <strong>50–70%</strong> before storage.</li>
                 <li>Store in a <strong>cool, dry location</strong> between 60°F–75°F (15°C–24°C). Avoid attics, vehicles, or anywhere with temperature extremes.</li>
                 <li><strong>Check every 3–6 months.</strong> Power the phone on briefly to verify charge level hasn't dropped significantly. Top off to 50% if needed, then power back off.</li>
               </ol>
               <p style="border-left:3px solid var(--cyan); padding-left:.75rem; margin:.5rem 0 .7rem; color:var(--ok);">A battery stored at 100% or 0% for months will lose permanent capacity. The 40–60% storage target is the single most impactful habit for kit longevity.</p>

               <p><strong>Battery Bot Pro — Pre-Installed App</strong></p>
               <p>Battery Bot Pro is a lightweight, open-source battery monitor pre-installed on every Survival Node. It runs in the status bar and notification shade, giving you real-time battery data without opening any app.</p>
               <ul>
                 <li><strong>Status bar percentage</strong> — shows exact charge % in the status bar at all times</li>
                 <li><strong>Live metrics in notifications</strong> — temperature, voltage, health status, and time since plugged/unplugged</li>
                 <li><strong>Charge current (mA)</strong> — shows how many milliamps are flowing to or from the battery (device-dependent)</li>
                 <li><strong>Custom alarms</strong> — set alerts for specific charge thresholds (e.g., alarm at 85% to stop overcharging, alarm at 15% before deep discharge)</li>
                 <li><strong>Temperature alarms</strong> — get notified if the battery temperature exceeds a set limit during charging</li>
                 <li><strong>Battery log + CSV export</strong> — logs charge, voltage, temperature, and health over time; exportable for review</li>
                 <li><strong>Home screen widget</strong> — large 4×1 widget showing live stats at a glance</li>
               </ul>
               <p><strong>Recommended Battery Bot Pro settings for Survival Node:</strong></p>
               <ul>

    const topicsEl = document.getElementById('topics');
    const titleEl = document.getElementById('guide-title');
    const contentEl = document.getElementById('guide-content');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');

    let i = 0;

    function renderTopics() {
      topicsEl.innerHTML = '';
      sections.forEach((s, idx) => {
        const b = document.createElement('button');
        b.className = 'topic-btn' + (idx === i ? ' active' : '');
        b.type = 'button';
        b.textContent = s.title;
        b.addEventListener('click', () => {
          i = idx;
          render();
        });
        topicsEl.appendChild(b);
      });
    }

    function render() {
      titleEl.textContent = sections[i].title;
      contentEl.innerHTML = sections[i].html;
      renderTopics();
      prevBtn.disabled = i === 0;
      nextBtn.disabled = i === sections.length - 1;
      prevBtn.style.opacity = i === 0 ? '.45' : '1';
      nextBtn.style.opacity = i === sections.length - 1 ? '.45' : '1';
    }

    prevBtn.addEventListener('click', () => {
      if (i > 0) { i -= 1; render(); }
    });

    nextBtn.addEventListener('click', () => {
      if (i < sections.length - 1) { i += 1; render(); }
    });

    render();

    document.getElementById('download-pdf-btn').addEventListener('click', function() {
      // Print-first flow (browser save-to-PDF)
      const old = document.getElementById('pdf-print-content');
      if (old) old.remove();

      const container = document.createElement('div');
      container.id = 'pdf-print-content';

      // Title page
      container.innerHTML =
        '<div class="pdf-title-page">' +
          '<img src="/images/case2.png" class="pdf-logo" alt="Survival Node" />' +
          '<h1 class="pdf-title-main">Survival Node</h1>' +
          '<p class="pdf-title-sub">Users Guide</p>' +
          '<div class="pdf-title-rule"></div>' +
          '<div class="pdf-contact">' +
            '<p class="pdf-contact-name">Eastern Shore AI, LLC</p>' +
            '<p>support@easternshore.ai</p>' +
            '<p>www.easternshore.ai</p>' +
            '<p>PO BOX 317 &middot; Parsonsburg, MD 21849</p>' +
          '</div>' +
        '</div>';

      // Strip inline style attributes so print CSS controls colors cleanly
      sections.forEach(function(section, idx) {
        const page = document.createElement('div');
        page.className = 'pdf-page' + (idx === 0 ? ' pdf-page-first' : '');
        const cleanHtml = section.html.replace(/ style="[^"]*"/g, '');
        page.innerHTML =
          '<div class="pdf-page-title">' + section.title + '</div>' +
          '<div class="guide-content">' + cleanHtml + '</div>';
        container.appendChild(page);
      });

      document.querySelector('.wrap').appendChild(container);

      function cleanup() {
        const c = document.getElementById('pdf-print-content');
        if (c) c.remove();
        window.removeEventListener('afterprint', cleanup);
      }
      window.addEventListener('afterprint', cleanup);

      window.print();
    });
  </script>
</body>
</html>
